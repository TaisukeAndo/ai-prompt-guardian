<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Prompt Shield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div id="header">
    <img src="../../icons/icon48.png" id="header-icon" alt="Prompt Shield" />
    <div id="header-text">
      <span id="title">Prompt Shield</span>
      <span id="subtitle">AI Prompt Security</span>
    </div>
    <span id="version">v0.1.0</span>
  </div>

  <!-- マスタートグル -->
  <div id="master-section">
    <div id="master-info">
      <span class="material-symbols-outlined" id="master-icon">verified_user</span>
      <div id="master-label">
        <span id="master-status-text">Protected</span>
        <span id="master-status-sub">Scanning prompts before send</span>
      </div>
    </div>
    <label class="toggle toggle-lg">
      <input type="checkbox" id="master-toggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <!-- 重要ルール（常時表示） -->
  <div id="rules-section">
    <div class="section-title">Critical Rules</div>
    <div id="rule-list-primary"></div>
  </div>

  <!-- 詳細設定（折りたたみ） -->
  <div id="detail-section">
    <button id="detail-toggle" aria-expanded="false">
      <div id="detail-toggle-left">
        <span class="material-symbols-outlined" id="detail-icon">tune</span>
        <span id="detail-label">Advanced</span>
      </div>
      <span class="material-symbols-outlined" id="detail-chevron">expand_more</span>
    </button>
    <div id="detail-body">
      <div class="section-title">Additional Rules</div>
      <div id="rule-list-secondary"></div>
    </div>
  </div>

  <div id="footer">
    <span class="material-symbols-outlined footer-icon">lock</span>
    Local processing only — no data is transmitted
  </div>

  <script src="popup.js"></script>
</body>
</html>
