<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>AI Prompt Guardian</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div id="header">
    <span id="logo">🛡️</span>
    <span id="title">AI Prompt Guardian</span>
  </div>

  <!-- マスタートグル -->
  <div id="master-section">
    <div id="master-label">
      <span id="master-status-text">保護中</span>
      <span id="master-status-sub">AIへの送信前に検査します</span>
    </div>
    <label class="toggle toggle-lg">
      <input type="checkbox" id="master-toggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <!-- 重要ルール（常時表示） -->
  <div id="rules-section">
    <div class="section-title">重要な検知ルール</div>
    <div id="rule-list-primary"></div>
  </div>

  <!-- 詳細設定（折りたたみ） -->
  <div id="detail-section">
    <button id="detail-toggle" aria-expanded="false">
      <span id="detail-label">詳細設定を表示</span>
      <span id="detail-chevron">›</span>
    </button>
    <div id="detail-body">
      <div class="section-title">その他の検知ルール</div>
      <div id="rule-list-secondary"></div>
    </div>
  </div>

  <div id="footer">v0.1.0 — データはローカルのみで処理</div>

  <script src="popup.js"></script>
</body>
</html>
